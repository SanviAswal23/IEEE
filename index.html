<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IEEE WIE Week — Treasure Hunt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #60a5fa; }
    p  { color: #94a3b8; margin-bottom: 2.5rem; font-size: 0.95rem; }
    .levels {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    a.level-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 2.5rem;
      background: #1e1e3a;
      border: 1px solid #3b4fd8;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      transition: transform 0.2s, background 0.2s;
    }
    a.level-btn:hover { background: #2d2d5a; transform: translateY(-4px); }
    .level-num { font-size: 2.5rem; font-weight: bold; color: #818cf8; }
    .level-label { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>🔍 IEEE WIE Week Treasure Hunt</h1>
  <p>Select a level to begin the challenge</p>
  <div class="levels">
    <a class="level-btn" href="./level2/level2/index.html">
      <span class="level-num">02</span>
      <span class="level-label">Level 2</span>
    </a>
    <a class="level-btn" href="./level3/level3/index.html">
      <span class="level-num">03</span>
      <span class="level-label">Level 3</span>
    </a>
    <a class="level-btn" href="./level5/level5/index.html">
      <span class="level-num">05</span>
      <span class="level-label">Level 5</span>
    </a>
  </div>
</body>
</html>
